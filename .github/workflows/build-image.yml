name: Build Image

on:
    workflow_dispatch:
    push:
        branches: ["main"]
        paths:
        - 'app/**' 

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            - name: Build the image
              run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/url-shortner:latest ./app 
            - name: Log In to DockerHub
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_PAT }}
            - name: Push the image to DockerHub
              run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/url-shortner:latest
