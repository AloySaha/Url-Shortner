name: Shortner Application

services:

  reverse_proxy:
    container_name: Shortner_Reverse_Proxy
    image: dhi.io/nginx:1-alpine
    ports:
      - 80:80
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      shortner:
        condition: service_healthy
    networks:
      - shortner-network
      
  shortner:
    container_name: Shortner_Backend
    image: aloysaha/url-shortner:latest
    ports:
      - 3000:${PORT}
    env_file:
      - ".env"
    depends_on:
      database:
        condition: service_healthy
      cache_db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:' + process.env.PORT + '/health', r => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
    - shortner-network

  database:
    container_name: Shortner_Database
    image: dhi.io/postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_USER: ${PGUSER}
      POSTGRES_DB: ${PGDATABASE}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shortener"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - pg_data:/var/lib/postgresql/18/data
    networks:
      - shortner-network
  
  cache_db:
    container_name: Shortner_Cache
    image: dhi.io/redis:8-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/etc/redis/redis.conf
    networks:
      - shortner-network

volumes:
  pg_data:
  redis_data:


networks:
  shortner-network: